# ---------------------------------------------------------------------------
# Segment domains (per path attribute, what kinds of element a segment can
# name). The legend under the "Path attributes" table in
# docs/edm-semantic-graph.md is generated from these.
#
# The members must match the resolver's segment enums in
# crates/csdl-edm/src/edm.rs. Resolver-internal variants that don't appear
# in CSDL itself (e.g. `Unresolved`, which carries the dangling-reference
# state) are intentionally NOT listed.
# ---------------------------------------------------------------------------

[[segment_domain]]
name = "KeyPathSegment"
members = ["Property"]
notes = "intrinsic to a single entity type; descends through ComplexType-valued structural properties, terminates at a primitive. Navigation properties are deliberately excluded — keys must be properties of the entity itself, not of related entities (contrast BindingPathSegment, which is the domain that traverses navigation)"

[[segment_domain]]
name = "BindingPathSegment"
members = [
  "Property",
  "NavigationProperty",
  "EntityTypeCast",
  "ComplexTypeCast",
  "EntitySet",
  "Singleton",
  "EntityContainer",
]
notes = "used by NavigationPropertyBinding.Path/Target and NavigationProperty.Partner; head is a container element in `target` form, properties/navs in `path` form"

[[segment_domain]]
name = "EntitySetPathSegment"
members = [
  "BindingParameter",
  "NavigationProperty",
  "Property",
]
notes = "Function.EntitySetPath / Action.EntitySetPath; starts at the binding parameter"

