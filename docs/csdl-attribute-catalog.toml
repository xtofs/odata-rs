# CSDL 4.01 attribute catalog — machine-readable single source of truth.
#
# This file is the normative data behind docs/edm-semantic-graph.md. The human
# tables in that document are generated from it (scripts/sync_attribute_catalog.py);
# prose in the document is authored by hand and never generated.
#
# Scope: the catalog covers **what CSDL 4.01 expresses, mapped to graph form** —
# not what any particular resolver implementation materializes. Elements that
# the reader collapses into parent fields (Edmx → CsdlDocument.edmx,
# DataServices → Edmx.schemas, Key → EntityType.keys, Annotations → bulk-target
# Annotation form) are still first-class entries here, with their attributes
# and containment edges, because they exist in the spec.
#
# Terminology: a CSDL document is a *syntactic tree*; resolving it yields the EDM,
# a *semantic graph*. Attributes are CSDL/syntactic; nodes/edges/paths are the EDM
# semantic graph. (See the document for the full convention.)
#
# Schema
# ------
# version : catalog schema version (integer)
# source  : the spec these rows are taken from
#
# [[containment]]  — a structural parent/child (has-a) reference of the syntactic
#                    tree. Not an attribute. Always an EDM edge labelled "has".
#   parent     : containing element kind
#   child      : contained element kind
#   notes      : optional
#   (Always projects to an EDM edge labelled "has".)
#
# [[attribute]]  — one attribute of one element kind.
#   element             : the owning CSDL element
#   name                : the attribute name (XML casing)
#   category            : "value" | "reference" | "path"
#   cardinality         : "required" | "optional"
#   reference_targets   : (category=reference) allowed target element kinds
#   path_segment_domain : (category=path) resolver segment enum, or a note if
#                         not yet resolved into typed segments
#   resolution_context  : (category=path/reference) what the name resolves against
#   head_kinds          : (category=path, optional) element kinds the FIRST
#                         segment of the path must resolve to. Omit when the
#                         head is determined by enclosing context (e.g. the
#                         owning entity type, the containing schema).
#   terminal_kinds      : (category=path, optional) element kinds the LAST
#                         segment of the path must resolve to. This is the
#                         path's terminator constraint per CSDL.
#   descent_kinds       : (category=path, optional) intermediate-segment
#                         constraint: kinds whose presence enables the path
#                         to continue past them. The classic case is
#                         "descent through ComplexType-valued structural
#                         Properties" in key/binding paths.
#   type                : (category=value, optional) loose TypeScript-style
#                         type expression for the attribute's value domain.
#                         If absent, falls back to [value_type_defaults]
#                         keyed by `name`. See the defaults section below.
#   notes               : optional free-form prose. Do not duplicate the
#                         structured constraint or type fields above —
#                         those render automatically into the doc's Notes
#                         column.
#
# Graph role is DERIVED from category, not stored (it is fully determined by it):
#   value       -> drop
#   reference   -> edge to the target node
#   path        -> a path through the named element nodes (+ implicit type nodes)
#   containment -> edge labelled "has"
# Primitive types (Edm.*) are intrinsic nodes of the semantic graph (not authored
# in CSDL — they are "just there"), so a reference to a primitive is an ordinary
# edge like any other. A consumer may elide primitive nodes for readability (the
# visualizer does), but that is a presentation filter, not a property of the graph.

version = 1
source = "OData CSDL 4.01"

# ---------------------------------------------------------------------------
# Default types for value attributes, keyed by attribute name.
#
# CSDL uses each named attribute consistently across element kinds — `Nullable`
# is always a boolean, `MaxLength` is always `integer | 'max'`, etc. — so the
# type is keyed by attribute name and inherited by every value-attribute entry
# below.
#
# Syntax: a loose TypeScript-style type expression. String literals use single
# quotes; the type union is `|`. Recognized scalars:
#   - `string`         — arbitrary string
#   - `identifier`     — CSDL SimpleIdentifier (single segment, regex-constrained,
#                        max 128 chars per CSDL 4.01 §17.1)
#   - `namespace`      — one or more SimpleIdentifiers separated by dots, with
#                        no trailing simple-name (CSDL Namespace, §15.2). E.g.
#                        `Org.OData.Core.V1`. Distinct from QualifiedName,
#                        which is `Namespace.SimpleIdentifier` (§15.3) and
#                        appears only in type-reference attributes.
#   - `boolean`        — `true` | `false`
#   - `integer`        — signed integer (may be refined; see below)
#   - `int64`          — signed 64-bit integer (enum member values)
#
# Integer refinement: an integer type may carry an inline range constraint,
# e.g. `integer > 0`, `integer >= 0`. Parenthesize the integer term when
# combining with a literal union: `(integer > 0) | 'max'`.
#
# An individual [[attribute]] may override its type with its own `type` field
# (none currently do — listed here for future extensibility).
# ---------------------------------------------------------------------------

[value_type_defaults]
Abstract = "boolean"
Alias = "identifier"
AppliesTo = "string"                          # whitespace-separated list of element-kind names
ContainsTarget = "boolean"
DefaultValue = "string"                       # raw text; concrete shape depends on the host's Type
HasStream = "boolean"
IncludeInServiceDocument = "boolean"
IsBound = "boolean"
IsComposable = "boolean"
IsFlags = "boolean"
MaxLength = "(integer > 0) | 'max'"
Name = "identifier"
Namespace = "namespace"
Nullable = "boolean"
OpenType = "boolean"
Precision = "integer >= 0"
Qualifier = "identifier"
Scale = "(integer >= 0) | 'floating' | 'variable'"   # additional constraint: Scale <= Precision (not expressible inline)
SRID = "(integer >= 0) | 'variable'"
TargetNamespace = "namespace"
TermNamespace = "namespace"
Unicode = "boolean"
Uri = "string"                                # URI; CSDL doesn't define a separate URI type
Value = "int64"
Version = "string"                            # CSDL/OData version, e.g. "4.01"

# The OnDelete.Action attribute is the one CSDL value attribute whose type is
# an explicit enum literal union. Lives on the [[attribute]] entry itself
# (overrides the empty default).

# ---------------------------------------------------------------------------
# Containment (structural has-a references; the majority of EDM edges)
#
# Note on Annotation: per CSDL 4.01, <Annotation> can be a child of nearly
# every element in the language. Those edges are implicit and not enumerated
# here. The single explicit Annotation containment edge below is from the
# plural <Annotations> wrapper, whose entire purpose is to group Annotations
# with a shared Target.
# ---------------------------------------------------------------------------

